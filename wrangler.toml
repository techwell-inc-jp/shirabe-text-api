name = "shirabe-text-api"
main = "src/index.ts"
compatibility_date = "2026-05-05"
compatibility_flags = ["nodejs_compat"]
account_id = "e23b560b7a00ce93fb33faa6cc7bc244"

# Workers ルート:
#   - /docs/text-* は B-3 cluster 効果獲得のため 5/10 で部分活性化(soft launch)
#   - /announcements/2026-05-18 は 5/18 リリース当日告知ページ
#   - /announcements/2026-05-31 は GSC indexed + AI 訓練データ既出 URL 維持目的(リリース日変更告知)
#   - /api/v1/text/* は 5/18 正式リリース時に下のコメントアウトを解除(Week 3 audit で 5/31 → 5/18 前倒し)
#
# Cloudflare routes precedence: path-based Worker Route(本 worker)は
# calendar-api の custom_domain `shirabe.dev` よりも具体的なため優先される。
[[routes]]
pattern = "shirabe.dev/docs/text-*"
zone_name = "shirabe.dev"
[[routes]]
pattern = "shirabe.dev/announcements/2026-05-18"
zone_name = "shirabe.dev"
[[routes]]
pattern = "shirabe.dev/announcements/2026-05-31"
zone_name = "shirabe.dev"
# [[routes]]
# pattern = "shirabe.dev/api/v1/text/*"
# zone_name = "shirabe.dev"

[vars]
API_VERSION = "0.1.0-phase2"

# Stripe Price ID(text API 用、2026-05-11 経営者発行完了、暦 API と同型 [vars] 平文配置)
# Meter: shirabe_text_api_requests = mtr_61Uf5qKTKrq2TuxCh41DV2wkNs8tVS6S
# Plan-α stable(暦 API と同単価 ¥0.05 / ¥0.03 / ¥0.01、transform_quantity[divide_by=1000, round=up])
STRIPE_PRICE_STARTER = "price_1TVi68DV2wkNs8tVry5EUNye"
STRIPE_PRICE_PRO = "price_1TVi8XDV2wkNs8tVmKktAjvG"
STRIPE_PRICE_ENTERPRISE = "price_1TViA7DV2wkNs8tVOxdaDFnZ"
# STRIPE_SECRET_KEY / STRIPE_WEBHOOK_SECRET は `wrangler secret put` で注入(別タスク)

# R2 binding for IPAdic dictionary(8 ファイル / 55 MB、Day 3 PoC で活性化済)
[[r2_buckets]]
binding = "DICT"
bucket_name = "shirabe-text-dict"
preview_bucket_name = "shirabe-text-dict"

# API_KEYS: **暦・住所 API と共有**(canonical: shirabe-calendar/wrangler.toml + 経営者判断 2026-04-22)。
# 1 キー集約構造(`apis.text` フィールド)で同一 API キーで text API にもアクセス可能。
[[kv_namespaces]]
binding = "API_KEYS"
id = "3b6bfff407974b7cbf79ded8e184c1a6"

# RATE_LIMITS: text API 専用(秒次 + 月次カウンター)。
[[kv_namespaces]]
binding = "RATE_LIMITS"
id = "18c0bd1723604b01b2a0c7992427da53"

# USAGE_LOGS: text API 専用(月間利用量カウント + リクエストログ)。
[[kv_namespaces]]
binding = "USAGE_LOGS"
id = "6f1ad57596ec4ed5badffbe3773ffc14"

# YAML ファイルをテキストモジュールとしてバンドルに取り込む(GET /openapi.yaml 用、5/24 まで)
[[rules]]
type = "Text"
globs = ["**/*.yaml"]
fallthrough = true
